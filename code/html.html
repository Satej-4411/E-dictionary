<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional E-Dictionary</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
}

.school-name {
    margin-top: 20px;
    font-size: 28px;
    font-weight: bold;
    animation: fadeIn 1s ease-in-out;
}

.department {
    font-size: 18px;
    margin-bottom: 20px;
    opacity: 0.9;
    animation: fadeIn 1.5s ease-in-out;
}

h1 {
    margin-top: 10px;
}

.search-container {
    margin: 20px auto;
}

input {
    padding: 12px;
    width: 250px;
    border-radius: 25px;
    border: none;
    outline: none;
    font-size: 16px;
}

.alphabet {
    margin: 20px;
}

.alphabet button {
    margin: 4px;
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: white;
    color: #2a5298;
    font-weight: bold;
    transition: transform 0.2s, background 0.3s;
}

.alphabet button:hover {
    transform: scale(1.2);
    background: #ffd700;
}

.word-container {
    max-width: 600px;
    margin: auto;
    text-align: left;
}

.word-card {
    background: rgba(255,255,255,0.1);
    margin: 10px 0;
    padding: 15px;
    border-radius: 12px;
    animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

.logo {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.logo img {
    width: 100px;
    height: 90px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.logo img:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 22px rgba(0,0,0,0.6);
}
  
  </style>
</head>

<body>
<img style="height:150px;width:130px;border: 3px solid white;" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTaCsLWVXEpqkqEm6xRI3tESI7kxa6jfSonNmiHFu9saw&s=10" 
     alt=".logo">
<h6>Siddheshwar Devsthan Operated, </h6>
  <div class="school-name">Siddheshwar Prashala, Solapur</div>
<div class="department">English Department</div>

<h1>E-Dictionary</h1>

<div class="search-container">
    <input type="text" id="searchBar" placeholder="Search word..." oninput="searchWord()">
</div>

<div class="alphabet" id="alphabetButtons"></div>

<div class="word-container" id="wordContainer"></div>

<script>
const dictionary = {
    Apple: "A sweet fruit that grows on trees.",
    Ant: "A small hardworking insect.",
    Ball: "A round object used in games.",
    Banana: "A long curved fruit with yellow skin.",
    Cat: "A small domesticated animal.",
    Car: "A vehicle used for transportation.",
    Dog: "A loyal domesticated animal.",
    Elephant: "A large mammal with a trunk.",
    Fish: "An aquatic animal.",
    Goat: "A farm animal known for milk.",
    House: "A building for living.",
    Ice: "Frozen water.",
    Jungle: "A dense forest.",
    Kite: "A toy flown in the wind.",
    Lion: "A wild animal known as 'The king of the jungle.' ",
    Monkey: "An animal from which humans devloped.",
    Nest: "A bird's home.",
    Orange: "A citrus fruit.",
    Pen: "An instrument for writing.",
    Queen: "A female ruler.",
    Rose: "A type of flower.",
    Sun: "The star at the center of our solar system.",
    Tiger: "A wild animal from cat family.",
    Umbrella: "Used to protect from rain.",
    Van: "A type of vehicle.",
    Wolf: "A wild animal related to dogs.",
    Xylophone: "A musical instrument.",
    Yawk: "A long-haired animal.",
    Zebra: "An animal with black and white stripes."
};

const wordContainer = document.getElementById("wordContainer");
const alphabetDiv = document.getElementById("alphabetButtons");
const searchInput = document.getElementById("searchBar");

function displayWords(wordsArray) {
    wordContainer.innerHTML = "";

    if (wordsArray.length === 0) {
        wordContainer.innerHTML = "<p>No words found.</p>";
        return;
    }

    wordsArray.forEach(word => {
        let card = document.createElement("div");
        card.className = "word-card";
        card.innerHTML = `<h3>${word}</h3><p>${dictionary[word]}</p>`;
        wordContainer.appendChild(card);
    });
}

function searchWord() {
    let value = searchInput.value.toLowerCase();
    let filtered = Object.keys(dictionary)
        .filter(word => word.toLowerCase().includes(value))
        .sort();
    displayWords(filtered);
}

function filterByLetter(letter) {
    searchInput.value = "";
    let filtered = Object.keys(dictionary)
        .filter(word => word.startsWith(letter))
        .sort();
    displayWords(filtered);
}

for(let i = 65; i <= 90; i++) {
    let letter = String.fromCharCode(i);
    let btn = document.createElement("button");
    btn.innerText = letter;
    btn.onclick = () => filterByLetter(letter);
    alphabetDiv.appendChild(btn);
}

displayWords(Object.keys(dictionary).sort());
</script>

</body>
</html>
